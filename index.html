<style>
:root {
  --primary: #1a1a2e;
  --accent: #e94560;
  --accent2: #f5a623;
  --bg: #0f0f23;
  --card-bg: #16213e;
  --card-border: #1a1a3e;
  --text: #e8e8f0;
  --text-muted: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; line-height: 1.5; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.fangenie-banner {
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
  padding: 10px 20px;
  text-align: center;
}
.fangenie-banner a {
  display: inline-flex; align-items: center; gap: 10px;
  flex-wrap: wrap; justify-content: center;
}
.powered-by {
  font-size: 0.85rem; font-weight: 600; color: #fff;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.fg-logo { height: 22px; width: auto; }
.fg-tagline {
  font-size: 0.85rem; color: #fff; font-weight: 500;
}

.site-header {
  padding: 24px 24px 16px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 12px;
  border-bottom: 1px solid var(--card-border);
}
.logo {
  font-family: 'Montserrat', sans-serif;
  font-size: 1.6rem; font-weight: 900;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.event-count {
  font-size: 0.9rem; color: var(--text-muted); font-weight: 500;
}
.event-count strong { color: var(--accent2); }

.hero {
  text-align: center;
  padding: 48px 24px 28px;
}
.hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 900;
  letter-spacing: -1.5px;
  background: linear-gradient(90deg, #fff 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 12px;
}
.hero p {
  color: var(--text-muted); font-size: 1.05rem;
  max-width: 600px; margin: 0 auto;
}

.controls {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px 24px 32px;
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.controls input, .controls select, .controls button {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.15s ease;
}
.controls input { flex: 1 1 280px; min-width: 240px; max-width: 420px; }
.controls select { min-width: 140px; }
.controls input:focus, .controls select:focus { border-color: var(--accent); }
.controls button {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border: none; cursor: pointer; font-weight: 600; color: #fff;
}
.controls button:hover { filter: brightness(1.1); }

.events-grid {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px 64px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.event-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.event-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 12px 28px rgba(233, 69, 96, 0.18);
}
.card-photo-wrap {
  position: relative;
  aspect-ratio: 16 / 9;
  overflow: hidden;
  background: #0a0a1f;
}
.card-photo-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  display: block;
}
.card-photo-fallback {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  color: #fff;
  text-align: center;
  padding: 16px;
  letter-spacing: -0.3px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.card-body {
  padding: 18px 18px 20px;
  display: flex; flex-direction: column; gap: 10px;
  flex: 1;
}
.card-artist {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: 1.15rem; color: var(--text);
  line-height: 1.25;
}
.card-meta {
  font-size: 0.88rem; color: var(--text-muted);
  display: flex; flex-direction: column; gap: 4px;
}
.card-meta .row {
  display: flex; align-items: flex-start; gap: 6px;
}
.card-meta .label { color: var(--accent2); font-weight: 600; min-width: 56px; }
.card-cta {
  margin-top: auto;
  display: inline-flex; justify-content: center; align-items: center;
  padding: 11px 14px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: #fff; font-weight: 700; font-size: 0.95rem;
  border-radius: 10px;
  text-decoration: none;
  transition: filter 0.15s ease;
}
.card-cta:hover { filter: brightness(1.1); }

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}

.site-footer {
  border-top: 1px solid var(--card-border);
  padding: 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}
@media (max-width: 600px) {
  .controls input, .controls select, .controls button { flex: 1 1 100%; max-width: none; }
  .events-grid { padding: 0 16px 48px; gap: 16px; }
  .hero { padding: 32px 20px 16px; }
}
</style>
</head>

// Hash-based gradient picker (10-color palette)
const GRADIENTS = [
  'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',
  'linear-gradient(135deg,#f093fb 0%,#f5576c 100%)',
  'linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)',
  'linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)',
  'linear-gradient(135deg,#fa709a 0%,#fee140 100%)',
  'linear-gradient(135deg,#30cfd0 0%,#330867 100%)',
  'linear-gradient(135deg,#a8edea 0%,#fed6e3 100%)',
  'linear-gradient(135deg,#ff9a9e 0%,#fecfef 100%)',
  'linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%)',
  'linear-gradient(135deg,#a18cd1 0%,#fbc2eb 100%)'
];

function gradientFor(slug) {
  let hash = 0;
  for (let i = 0; i < slug.length; i++) {
    hash = ((hash << 5) - hash) + slug.charCodeAt(i);
    hash |= 0;
  }
  return GRADIENTS[Math.abs(hash) % GRADIENTS.length];
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function formatDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  const opts = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' };
  return dt.toLocaleDateString('en-US', opts);
}

function renderEvents(filtered) {
  const grid = document.getElementById('eventsGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">No upcoming shows match your filters. Try clearing them.</div>';
    return;
  }
  grid.innerHTML = filtered.map(ev => {
    const grad = gradientFor(ev.slug);
    const dateText = ev.showInfo || formatDate(ev.date);
    const cityState = [ev.city, ev.state].filter(Boolean).join(', ');
    return `
      <article class="event-card">
        <div class="card-photo-wrap">
          <img src="${PHOTO_BASE}${escapeHtml(ev.slug)}.jpg" alt="${escapeHtml(ev.artist)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(ev.artist)}</div>
        </div>
        <div class="card-body">
          <div class="card-artist">${escapeHtml(ev.artist)}</div>
          <div class="card-meta">
            <div class="row"><span class="label">Date</span><span>${escapeHtml(dateText)}${ev.showtime ? ' · ' + escapeHtml(ev.showtime) : ''}</span></div>
            ${cityState ? `<div class="row"><span class="label">Where</span><span>${escapeHtml(cityState)}</span></div>` : ''}
            ${ev.location ? `<div class="row"><span class="label">Venue</span><span>${escapeHtml(ev.location)}</span></div>` : ''}
          </div>
          <a class="card-cta" href="${escapeHtml(ev.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
        </div>
      </article>
    `;
  }).join('');
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const st = document.getElementById('stateFilter').value;
  const filtered = events.filter(ev => {
    if (st && ev.state !== st) return false;
    if (q) {
      const hay = [ev.artist, ev.city, ev.state, ev.location].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('eventCount').textContent = filtered.length;
  renderEvents(filtered);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('stateFilter').addEventListener('change', applyFilters);
document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('stateFilter').value = '';
  applyFilters();
});

renderEvents(events);
</script>
