<style>
:root{
  --primary:#1a1a2e;
  --accent:#e94560;
  --accent2:#f5a623;
  --bg:#0f0f23;
  --card-bg:#16213e;
  --card-border:#1a1a3e;
  --text:#e8e8f0;
  --text-muted:#8888aa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

.fangenie-banner{background:linear-gradient(90deg,#0a0a1f 0%,#1a1a3e 100%);border-bottom:1px solid rgba(233,69,96,0.25);padding:10px 16px}
.fangenie-banner a{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;color:var(--text)}
.fangenie-banner .powered-by{font-size:12px;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase}
.fangenie-banner .fg-logo{height:22px;width:auto;filter:brightness(1.1)}
.fangenie-banner .fg-tagline{font-size:13px;color:var(--text);font-weight:500}
.fangenie-banner a:hover{filter:brightness(1.15)}

.site-header{background:linear-gradient(180deg,#15152e 0%,#0f0f23 100%);border-bottom:1px solid rgba(255,255,255,0.05);padding:18px 20px}
.site-header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.brand{font-family:'Montserrat',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.02em;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.event-count{font-size:14px;color:var(--text-muted);font-weight:500}
.event-count strong{color:var(--accent2)}

.hero{padding:48px 20px 24px;text-align:center;background:radial-gradient(ellipse at center,rgba(233,69,96,0.10),transparent 60%)}
.hero h1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:clamp(28px,4.5vw,46px);letter-spacing:-0.02em;line-height:1.1;margin-bottom:10px}
.hero p{color:var(--text-muted);font-size:16px;max-width:640px;margin:0 auto}

.controls{max-width:1280px;margin:0 auto;padding:24px 20px 12px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.controls input,.controls select,.controls button{font-family:inherit;font-size:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:#1c1c3a;color:var(--text);padding:12px 14px;outline:none;transition:border-color .15s,box-shadow .15s}
.controls input{flex:1 1 280px;min-width:240px}
.controls input::placeholder{color:var(--text-muted)}
.controls input:focus,.controls select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,0.15)}
.controls select{flex:0 1 220px;cursor:pointer}
.controls button{background:linear-gradient(90deg,var(--accent),#d63655);color:#fff;border:0;font-weight:600;cursor:pointer;padding:12px 18px}
.controls button:hover{filter:brightness(1.1)}
.results-count{max-width:1280px;margin:6px auto 0;padding:0 20px;color:var(--text-muted);font-size:13px}

.events-grid{max-width:1280px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.empty-state{grid-column:1/-1;text-align:center;color:var(--text-muted);padding:60px 20px;font-size:16px}

.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.card:hover{transform:translateY(-3px);border-color:rgba(233,69,96,0.4);box-shadow:0 12px 32px rgba(0,0,0,0.35)}
.card-photo-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:#0f0f23}
.card-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.card-photo-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-family:'Montserrat',sans-serif;font-weight:800;color:#fff;font-size:18px;letter-spacing:-0.01em;line-height:1.15;text-shadow:0 2px 8px rgba(0,0,0,0.45)}
.card-body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:6px;flex:1}
.card-artist{font-family:'Montserrat',sans-serif;font-weight:700;font-size:18px;letter-spacing:-0.01em;line-height:1.2;color:var(--text);margin-bottom:2px}
.card-meta{font-size:13px;color:var(--text-muted);line-height:1.45}
.card-meta strong{color:var(--text);font-weight:600}
.card-date{display:inline-block;font-size:12px;font-weight:600;color:var(--accent2);background:rgba(245,166,35,0.10);border:1px solid rgba(245,166,35,0.25);padding:4px 8px;border-radius:6px;margin-bottom:8px;letter-spacing:.02em}
.card-cta{margin-top:auto;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--accent),#d63655);color:#fff;font-weight:600;font-size:14px;padding:11px 14px;border-radius:10px;margin-top:14px;transition:filter .15s,transform .15s}
.card-cta:hover{filter:brightness(1.12)}

.site-footer{border-top:1px solid rgba(255,255,255,0.05);padding:24px 20px;text-align:center;color:var(--text-muted);font-size:13px}
.site-footer a{color:var(--accent2)}

@media (max-width:600px){
  .hero{padding:32px 16px 12px}
  .controls{padding:18px 16px 6px}
  .events-grid{padding:18px 16px 40px;gap:16px}
}
</style>
</head>

function gradientFor(s){
  let h = 0;
  for(let i=0;i<s.length;i++){h = (h*31 + s.charCodeAt(i)) >>> 0;}
  return GRADIENTS[h % GRADIENTS.length];
}

  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escAttr(s){
  return escHtml(s).replace(/`/g,'&#96;');

  if(!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, d));
  return dt.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric', year:'numeric', timeZone:'UTC'});
}

function renderCard(e){
  const grad = gradientFor(e.slug || e.artist);
  const photoUrl = PHOTO_BASE + (e.slug || '') + '.jpg';
  const cityState = [e.city, e.state].filter(Boolean).join(', ');
  return `
    <article class="card">
      <div class="card-photo-wrap">
        <img src="${escAttr(photoUrl)}" alt="${escAttr(e.artist)}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-photo-fallback" style="display:none;background:${grad}">${escHtml(e.artist)}</div>
      </div>
      <div class="card-body">
        <span class="card-date">${escHtml(e.show_info || fmtDate(e.date))}${e.showtime ? ' &bull; ' + escHtml(e.showtime) : ''}</span>
        <h3 class="card-artist">${escHtml(e.artist)}</h3>
        <div class="card-meta">${cityState ? '<strong>' + escHtml(cityState) + '</strong>' : ''}</div>
        <div class="card-meta">${escHtml(e.location)}</div>
        <a class="card-cta" href="${escAttr(e.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
      </div>
    </article>
  `;
}

const grid = document.getElementById('eventsGrid');
const searchInput = document.getElementById('searchInput');
const stateFilter = document.getElementById('stateFilter');
const clearBtn = document.getElementById('clearBtn');
const resultsCount = document.getElementById('resultsCount');

function render(){
  const q = (searchInput.value || '').trim().toLowerCase();
  const st = stateFilter.value;
  const filtered = events.filter(e => {
    if(st && e.state !== st) return false;
    if(!q) return true;
    return (
      (e.artist || '').toLowerCase().includes(q) ||
      (e.city || '').toLowerCase().includes(q) ||
      (e.state || '').toLowerCase().includes(q) ||
      (e.location || '').toLowerCase().includes(q) ||
      (e.platform || '').toLowerCase().includes(q)
    );
  });
  resultsCount.textContent = filtered.length === events.length
    ? `Showing all ${events.length} shows`
    : `Showing ${filtered.length} of ${events.length} shows`;
  if(filtered.length === 0){
    grid.innerHTML = '<div class="empty-state">No shows match your filters. Try clearing them.</div>';
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

searchInput.addEventListener('input', render);
stateFilter.addEventListener('change', render);
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  stateFilter.value = '';
  render();
});

render();
</script>
</body>
</html>
