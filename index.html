<style>
:root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #f5a623;
    --bg: #0f0f23;
    --card-bg: #16213e;
    --card-border: #1a1a3e;
    --text: #e8e8f0;
    --text-muted: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
a { color: inherit; text-decoration: none; }

/* FanGenie Banner */
.fangenie-banner {
    background: linear-gradient(90deg, #1a1a3e, #0f0f23);
    border-bottom: 1px solid rgba(245, 166, 35, 0.2);
    padding: 8px 16px;
    text-align: center;
}
.fangenie-banner a {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}
.fangenie-banner .powered-by {
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
}
.fangenie-banner .fg-logo {
    height: 22px;
    vertical-align: middle;
}
.fangenie-banner .fg-tagline {
    color: var(--accent2);
    font-size: 12px;
    font-weight: 600;
}

/* Header */
header {
    background: var(--primary);
    padding: 20px 24px;
    border-bottom: 1px solid var(--card-border);
}
.header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}
.logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.event-count {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 500;
}
.event-count strong {
    color: var(--accent2);
}

/* Hero */
.hero {
    text-align: center;
    padding: 56px 24px 32px;
    background: radial-gradient(ellipse at top, rgba(233, 69, 96, 0.15), transparent 60%);
}
.hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: -1px;
    margin-bottom: 12px;
}
.hero p {
    color: var(--text-muted);
    font-size: clamp(1rem, 2vw, 1.15rem);
    max-width: 600px;
    margin: 0 auto;
}

/* Controls */
.controls {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
}
.search-input, .state-select {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 15px;
    flex: 1;
    min-width: 200px;
    transition: border-color 0.2s;
}
.search-input:focus, .state-select:focus {
    outline: none;
    border-color: var(--accent);
}
.state-select { flex: 0 0 auto; min-width: 160px; cursor: pointer; }
.btn-clear {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    padding: 12px 20px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-clear:hover {
    border-color: var(--accent);
    color: var(--accent);
}

/* Grid */
.grid {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
}
.card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
}
.card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 10px 30px rgba(233, 69, 96, 0.15);
}
.card-photo-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: var(--primary);
}
.card-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.card-photo-fallback {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 1.25rem;
    line-height: 1.2;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    letter-spacing: -0.3px;
}
.card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.card-artist {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    line-height: 1.25;
}
.card-meta {
    color: var(--text-muted);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.card-date { color: var(--accent2); font-weight: 600; font-size: 14px; }
.card-location { color: var(--text-muted); font-size: 13px; }
.card-btn {
    display: block;
    margin-top: auto;
    padding: 11px 16px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #fff;
    text-align: center;
    border-radius: 8px;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
}
.card-btn:hover { opacity: 0.92; }
.card-btn:active { transform: scale(0.98); }
.no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
}
.no-results h3 {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.5rem;
    color: var(--text);
    margin-bottom: 8px;
}

/* Footer */
footer {
    background: var(--primary);
    padding: 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid var(--card-border);
    margin-top: auto;
}
footer a { color: var(--accent2); }

@media (max-width: 600px) {
    .controls { flex-direction: column; align-items: stretch; }
    .search-input, .state-select { min-width: 0; }
}
</style>

document.getElementById('year').textContent = new Date().getFullYear();
document.getElementById('eventCount').textContent = events.length;

// Hash-based gradient generator (10-color palette)
const PALETTE = [
    ['#e94560', '#f5a623'],
    ['#3a86ff', '#8338ec'],
    ['#06ffa5', '#3a86ff'],
    ['#ff006e', '#fb5607'],
    ['#ffbe0b', '#fb5607'],
    ['#8338ec', '#ff006e'],
    ['#00b4d8', '#0077b6'],
    ['#f72585', '#7209b7'],
    ['#06d6a0', '#118ab2'],
    ['#ef476f', '#ffd166']
];
function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}
function gradientFor(slug) {
    const [a, b] = PALETTE[hashStr(slug) % PALETTE.length];
    const angle = (hashStr(slug + 'x') % 360);
    return `linear-gradient(${angle}deg, ${a}, ${b})`;
}

function fmtDate(iso) {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function cardHtml(e) {
    const grad = gradientFor(e.slug);
    const photoUrl = PHOTO_BASE + e.slug + '.jpg';
    const cityState = [e.city, e.state].filter(Boolean).join(', ');
    const showtime = e.showtime ? ' &middot; ' + escapeHtml(e.showtime.trim()) : '';
    return `
    <div class="card">
        <div class="card-photo-wrap">
            <img src="${escapeHtml(photoUrl)}" alt="${escapeHtml(e.artist)}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(e.artist)}</div>
        </div>
        <div class="card-body">
            <div class="card-artist">${escapeHtml(e.artist)}</div>
            <div class="card-date">${fmtDate(e.date)}${showtime}</div>
            <div class="card-meta">${escapeHtml(cityState)}</div>
            ${e.location && e.location.trim() && e.location.trim() !== ', ,' ? `<div class="card-location">${escapeHtml(e.location)}</div>` : ''}
            <a class="card-btn" href="${escapeHtml(e.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
        </div>
    </div>`;
}

function render() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const stateF = document.getElementById('stateSelect').value;
    const grid = document.getElementById('grid');

    const filtered = events.filter(e => {
        if (stateF && e.state !== stateF) return false;
        if (q) {
            const hay = ((e.artist || '') + ' ' + (e.city || '') + ' ' + (e.location || '') + ' ' + (e.state || '')).toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });

    if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results"><h3>No shows found</h3><p>Try adjusting your filters.</p></div>`;
    } else {
        grid.innerHTML = filtered.map(cardHtml).join('');
    }
    document.getElementById('eventCount').textContent = filtered.length;
}

function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('stateSelect').value = '';
    render();
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('stateSelect').addEventListener('change', render);

render();
</script>
