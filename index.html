<style>
:root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #f5a623;
    --bg: #0f0f23;
    --card-bg: #16213e;
    --card-border: #1a1a3e;
    --text: #e8e8f0;
    --text-muted: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

.fangenie-banner {
    background: linear-gradient(90deg, #1a1a2e, #2a2a4e);
    border-bottom: 1px solid var(--card-border);
    padding: 8px 16px;
    text-align: center;
    font-size: 14px;
}
.fangenie-banner a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
}
.fangenie-banner .powered-by { color: var(--text-muted); font-weight: 500; }
.fangenie-banner .fg-logo { height: 22px; vertical-align: middle; }
.fangenie-banner .fg-tagline { color: var(--text); font-weight: 500; }

header {
    padding: 24px 16px 16px;
    text-align: center;
    border-bottom: 1px solid var(--card-border);
    background: var(--primary);
}
.logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    display: inline-block;
}
.event-count {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 6px;
}

.hero {
    padding: 48px 16px 24px;
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
}
.hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 44px);
    line-height: 1.15;
    letter-spacing: -0.02em;
}
.hero p { color: var(--text-muted); margin-top: 12px; font-size: 17px; }

.controls {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.controls input,
.controls select,
.controls button {
    font-family: inherit;
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.controls input { flex: 1; min-width: 200px; }
.controls select { min-width: 140px; cursor: pointer; }
.controls input:focus,
.controls select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.15); }
.controls button {
    cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    font-weight: 600;
    transition: transform 0.15s, box-shadow 0.15s;
}
.controls button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(233, 69, 96, 0.25); }

main { max-width: 1100px; margin: 0 auto; padding: 0 16px 64px; }
.events {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}
.empty {
    text-align: center;
    padding: 64px 16px;
    color: var(--text-muted);
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
}

.card-photo-wrap {
    aspect-ratio: 16 / 9;
    overflow: hidden;
    position: relative;
    background: var(--primary);
}
.card-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.card-photo-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(18px, 3vw, 26px);
    color: white;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
    letter-spacing: 0.01em;
}

.card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; flex: 1; }
.card-artist {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 19px;
    line-height: 1.2;
    margin-bottom: 8px;
    color: var(--text);
}
.card-date {
    color: var(--accent2);
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
}
.card-time { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
.card-venue { color: var(--text); font-size: 14px; margin-bottom: 4px; font-weight: 500; }
.card-location { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; flex: 1; }
.card-cta {
    display: inline-block;
    text-align: center;
    padding: 11px 14px;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: white;
    font-weight: 600;
    font-size: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
}
.card-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(233, 69, 96, 0.3); }
.card-platform {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 8px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

footer {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    border-top: 1px solid var(--card-border);
}

@media (max-width: 640px) {
    .events { grid-template-columns: 1fr; }
    .hero { padding: 32px 16px 20px; }
    .controls { padding-bottom: 16px; }
}
</style>

// 10-color gradient palette for fallback artwork
const PALETTE = [
    'linear-gradient(135deg, #e94560, #f5a623)',
    'linear-gradient(135deg, #6a11cb, #2575fc)',
    'linear-gradient(135deg, #ff6e7f, #bfe9ff)',
    'linear-gradient(135deg, #f7971e, #ffd200)',
    'linear-gradient(135deg, #4e54c8, #8f94fb)',
    'linear-gradient(135deg, #11998e, #38ef7d)',
    'linear-gradient(135deg, #b06ab3, #4568dc)',
    'linear-gradient(135deg, #ee0979, #ff6a00)',
    'linear-gradient(135deg, #00c6ff, #0072ff)',
    'linear-gradient(135deg, #f857a6, #ff5858)'
];

function hashString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
    }
    return Math.abs(h);
}

function gradientFor(slug) {
    return PALETTE[hashString(slug) % PALETTE.length];
}

function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function escapeAttr(s) { return escapeHtml(s); }

function formatDate(iso) {
    if (!iso) return '';
    const parts = iso.split('-');
    if (parts.length !== 3) return iso;
    const [y, m, d] = parts.map(Number);
    const date = new Date(Date.UTC(y, m - 1, d));
    return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function renderCard(ev) {
    const grad = gradientFor(ev.slug);
    const photoUrl = PHOTO_BASE + ev.slug + '.jpg';
    const cityState = [ev.city, ev.state].filter(Boolean).join(', ');
    return `
    <article class="card">
        <div class="card-photo-wrap">
            <img src="${escapeAttr(photoUrl)}" alt="${escapeAttr(ev.artist)}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(ev.artist)}</div>
        </div>
        <div class="card-body">
            <h3 class="card-artist">${escapeHtml(ev.artist)}</h3>
            <div class="card-date">${escapeHtml(formatDate(ev.date))}</div>
            ${ev.showtime ? `<div class="card-time">${escapeHtml(ev.showtime)}</div>` : ''}
            ${cityState ? `<div class="card-venue">${escapeHtml(cityState)}</div>` : ''}
            ${ev.location ? `<div class="card-location">${escapeHtml(ev.location)}</div>` : '<div class="card-location"></div>'}
            <a class="card-cta" href="${escapeAttr(ev.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
            ${ev.platform ? `<div class="card-platform">via ${escapeHtml(ev.platform)}</div>` : ''}
        </div>
    </article>`;
}

function applyFilters() {
    const q = (document.getElementById('search').value || '').trim().toLowerCase();
    const st = document.getElementById('state').value || '';
    return events.filter(ev => {
        if (st && ev.state !== st) return false;
        if (q) {
            const hay = [ev.artist, ev.city, ev.state, ev.location, ev.platform, ev.showInfo].filter(Boolean).join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });
}

function render() {
    const filtered = applyFilters();
    const container = document.getElementById('events');
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty">No events match your filters. Try clearing the search or state filter.</div>';
    } else {
        container.innerHTML = filtered.map(renderCard).join('');
    }
    document.getElementById('event-count').textContent = filtered.length === events.length
        ? `${events.length} upcoming events`
        : `Showing ${filtered.length} of ${events.length} events`;
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('state').addEventListener('change', render);
    document.getElementById('clear').addEventListener('click', () => {
        document.getElementById('search').value = '';
        document.getElementById('state').value = '';
        render();
    });
    render();
});
</script>
