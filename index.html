<style>
:root {
  --primary: #1a1a2e;
  --accent: #e94560;
  --accent2: #f5a623;
  --bg: #0f0f23;
  --card-bg: #16213e;
  --card-border: #1a1a3e;
  --text: #e8e8f0;
  --text-muted: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }

.fangenie-banner {
  background: linear-gradient(90deg, #1a1a2e 0%, #2a1a4e 100%);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 10px 20px;
  text-align: center;
}
.fangenie-banner a { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
.fangenie-banner .powered-by { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.fangenie-banner .fg-logo { height: 22px; width: auto; filter: brightness(1.1); }
.fangenie-banner .fg-tagline { font-size: 13px; color: var(--text); font-weight: 500; }

header.site-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 32px;
  background: rgba(26,26,46,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--card-border);
  position: sticky; top: 0; z-index: 100;
}
header .logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 24px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}
header .event-count { font-size: 13px; color: var(--text-muted); font-weight: 500; }
header .event-count strong { color: var(--accent2); font-weight: 700; }

.hero {
  text-align: center;
  padding: 80px 20px 40px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(233,69,96,0.15), transparent 50%),
    radial-gradient(ellipse at 80% 0%, rgba(245,166,35,0.12), transparent 50%);
}
.hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(32px, 5vw, 56px);
  font-weight: 800;
  margin-bottom: 16px;
  letter-spacing: -1px;
  line-height: 1.1;
}
.hero p { color: var(--text-muted); font-size: 18px; max-width: 620px; margin: 0 auto; }

.controls {
  display: flex; flex-wrap: wrap; gap: 12px;
  max-width: 1200px; margin: 0 auto; padding: 0 24px 24px;
  align-items: center;
}
.controls input, .controls select {
  background: var(--card-bg);
  color: var(--text);
  border: 1px solid var(--card-border);
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  min-width: 200px;
  flex: 1;
  transition: border-color .15s ease;
}
.controls input:focus, .controls select:focus {
  outline: none;
  border-color: var(--accent);
}
.controls button {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--card-border);
  padding: 12px 18px;
  border-radius: 10px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
  transition: all .15s ease;
}
.controls button:hover { color: var(--accent); border-color: var(--accent); }

.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px 24px 80px;
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  overflow: hidden;
  transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
  display: flex; flex-direction: column;
}
.card:hover {
  transform: translateY(-4px);
  border-color: rgba(233,69,96,0.4);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.card-photo-wrap {
  position: relative;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: #0a0a1a;
}
.card-photo-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.card-photo-fallback {
  position: absolute; inset: 0;
  display: none;
  align-items: center; justify-content: center;
  padding: 16px;
  text-align: center;
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 20px;
  color: #fff;
  letter-spacing: -0.3px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.35);
  line-height: 1.15;
}
.card-body { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.card-artist {
  font-family: 'Montserrat', sans-serif;
  font-size: 19px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--text);
}
.card-date {
  font-size: 13px;
  color: var(--accent2);
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.card-location { font-size: 14px; color: var(--text-muted); line-height: 1.4; }
.card-location strong { color: var(--text); font-weight: 600; }
.card-showtime { font-size: 12px; color: var(--text-muted); }
.card-cta {
  margin-top: auto;
  display: inline-block;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
  color: #fff;
  padding: 11px 16px;
  border-radius: 10px;
  text-align: center;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.3px;
  transition: transform .12s ease, box-shadow .12s ease;
}
.card-cta:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(233,69,96,0.35); }
.card-platform {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 2px;
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  grid-column: 1 / -1;
}
.empty-state h3 { font-family: 'Montserrat', sans-serif; color: var(--text); margin-bottom: 10px; }

footer {
  border-top: 1px solid var(--card-border);
  padding: 32px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}
footer .meta { margin-top: 6px; font-size: 11px; opacity: 0.7; }

@media (max-width: 640px) {
  header.site-header { padding: 16px 20px; }
  header .logo { font-size: 20px; }
  .hero { padding: 60px 16px 30px; }
  .controls { padding: 0 16px 20px; }
  .events-grid { padding: 16px 16px 60px; grid-template-columns: 1fr; }
}
</style>

// Hash-based gradient fallback (10-color palette)
const gradientPalette = [
  ['#e94560','#f5a623'],
  ['#8338ec','#3a86ff'],
  ['#06d6a0','#1b9aaa'],
  ['#ff006e','#8338ec'],

  ['#7209b7','#f72585'],
  ['#2a9d8f','#e9c46a'],
  ['#ef476f','#118ab2']
];
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function gradientFor(slug) {
  const p = gradientPalette[hashStr(slug) % gradientPalette.length];
  return `linear-gradient(135deg, ${p[0]} 0%, ${p[1]} 100%)`;
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const countEl = document.getElementById('eventCount');

function renderCard(ev) {
  const grad = gradientFor(ev.slug);
  const locationLine = [ev.city, ev.state].filter(Boolean).join(', ');
  return `
    <article class="card">
      <div class="card-photo-wrap">
        <img src="${PHOTO_BASE}${encodeURIComponent(ev.slug)}.jpg" alt="${esc(ev.artist)}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-photo-fallback" style="background:${grad}">${esc(ev.artist)}</div>
      </div>
      <div class="card-body">
        <div class="card-date">${esc(ev.dateText)}${ev.showtime ? ' &bull; ' + esc(ev.showtime) : ''}</div>
        <div class="card-artist">${esc(ev.artist)}</div>
        ${locationLine ? `<div class="card-location"><strong>${esc(locationLine)}</strong></div>` : ''}
        ${ev.location ? `<div class="card-showtime">${esc(ev.location)}</div>` : ''}
        <a class="card-cta" href="${esc(ev.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
        ${ev.platform ? `<div class="card-platform">via ${esc(ev.platform)}</div>` : ''}
      </div>
    </article>
  `;
}

function render() {
  const q = searchInput.value.trim().toLowerCase();
  const st = stateSelect.value;
  const filtered = events.filter(ev => {
    if (st && ev.state !== st) return false;
    if (!q) return true;
    return (ev.artist + ' ' + ev.city + ' ' + ev.state + ' ' + ev.location).toLowerCase().includes(q);
  });
  countEl.textContent = filtered.length;
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><h3>No shows match your filters.</h3><p>Try adjusting your search or clearing filters.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

searchInput.addEventListener('input', render);
stateSelect.addEventListener('change', render);
clearBtn.addEventListener('click', () => {
  searchInput.value = ''; stateSelect.value = ''; render();
});

render();
</script>
</body>
</html>
