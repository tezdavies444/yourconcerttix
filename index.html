        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #1a1a2e;

            --accent2: #f5a623;
            --bg: #0f0f23;
            --card-bg: #16213e;
            --card-border: #1a1a3e;
            --text: #e8e8f0;
            --text-muted: #8888aa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        .fangenie-banner {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            border-bottom: 1px solid var(--card-border);
            padding: 10px 20px;
            text-align: center;
        }
        .fangenie-banner a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .powered-by {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .fg-logo {
            height: 28px;
            vertical-align: middle;
        }
        .fg-tagline {
            font-size: 0.8rem;
            color: var(--accent2);
            font-weight: 500;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #0f0f23 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .event-count {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .hero {
            text-align: center;
            padding: 50px 20px 30px;
        }
        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .controls {
            max-width: 700px;
            margin: 0 auto 40px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls input, .controls select {
            padding: 12px 18px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .controls input:focus, .controls select:focus {
            border-color: var(--accent);
        }
        .controls input {
            flex: 1;
            min-width: 200px;
        }
        .controls select {
            min-width: 120px;
        }
        .btn-clear {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-clear:hover {
            background: var(--accent);
            color: white;
        }
        .events-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(233, 69, 96, 0.15);
        }
        .card-photo-wrap {
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
            background: var(--primary);
        }
        .card-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-photo-fallback {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            padding: 15px;
            text-align: center;
        }
        .card-body {
            padding: 18px;
        }
        .card-artist {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            margin-bottom: 8px;
            color: white;
        }
        .card-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .card-detail .icon {
            flex-shrink: 0;
            width: 16px;
            text-align: center;
        }
        .card-btn {
            display: block;
            margin-top: 14px;
            padding: 10px;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), #c13550);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .card-btn:hover {
            opacity: 0.9;
        }
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--card-border);
        }
        @media (max-width: 600px) {
            header { padding: 15px 20px; }

            .hero h1 { font-size: 1.8rem; }

        }
    </style>
</head>

        const palette = ['#e94560','#f5a623','#00d2d3','#6c5ce7','#fd79a8','#00b894','#e17055','#0984e3','#fdcb6e','#a29bfe'];
        function hashStr(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
            return Math.abs(h);
        }
        function gradient(slug) {
            const h = hashStr(slug);
            const c1 = palette[h % palette.length];
            const c2 = palette[(h + 3) % palette.length];
            const angle = (h % 360);
            return 'linear-gradient(' + angle + 'deg, ' + c1 + ', ' + c2 + ')';
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        }

        function renderCards(list) {
            const grid = document.getElementById('eventsGrid');
            const countEl = document.getElementById('eventCount');
            countEl.textContent = list.length + ' Show' + (list.length !== 1 ? 's' : '');
            if (!list.length) {
                grid.innerHTML = '<div class="no-results">No shows found matching your search.</div>';
                return;
            }
            grid.innerHTML = list.map(e => `
                <div class="card">
                    <div class="card-photo-wrap">
                        <img src="${PHOTO_BASE}${e.slug}.jpg" alt="${e.artist}" loading="lazy"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="card-photo-fallback" style="display:none;background:${gradient(e.slug)}">${e.artist}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-artist">${e.artist}</div>
                        <div class="card-detail"><span class="icon">&#128197;</span>${e.showInfo || formatDate(e.date)}</div>
                        ${e.showtime ? `<div class="card-detail"><span class="icon">&#128336;</span>${e.showtime}</div>` : ''}
                        <div class="card-detail"><span class="icon">&#128205;</span>${e.city}${e.state ? ', ' + e.state : ''}</div>
                        ${e.location ? `<div class="card-detail"><span class="icon">&#127970;</span>${e.location}</div>` : ''}
                        <a href="${e.ticket}" target="_blank" rel="noopener" class="card-btn">Get Tickets${e.platform ? ' — ' + e.platform : ''}</a>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const st = document.getElementById('stateFilter').value;
            const filtered = events.filter(e => {
                if (st && e.state !== st) return false;
                if (q && !(e.artist.toLowerCase().includes(q) || e.city.toLowerCase().includes(q) || (e.location && e.location.toLowerCase().includes(q)))) return false;
                return true;
            });
            renderCards(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('stateFilter').addEventListener('change', applyFilters);
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('stateFilter').value = '';
            applyFilters();
        });

        renderCards(events);
    </script>
