<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find live concerts and shows near you. Get tickets to your favorite tribute bands and artists.">
    <title>YourConcertTix - Find Live Shows &amp; Get Tickets</title>

    <meta property="og:description" content="Discover live concerts and tribute shows. Browse 82+ upcoming events.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourconcerttix.com">

    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent2: #f5a623;
            --bg: #0f0f23;
            --card-bg: #16213e;
            --card-border: #1a1a3e;
            --text: #e8e8f0;
            --text-muted: #8888aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.55;
        }
        a { color: inherit; text-decoration: none; }
        img { display: block; max-width: 100%; }

        .fangenie-banner {
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #2a2a4e;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
        }
        .fangenie-banner a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .fangenie-banner .powered-by { color: var(--text-muted); font-weight: 500; }
        .fangenie-banner .fg-logo { height: 22px; vertical-align: middle; }
        .fangenie-banner .fg-tagline { color: var(--text); font-weight: 600; }

        header.site-header {
            padding: 28px 24px 16px;
            text-align: center;
            border-bottom: 1px solid #1f1f3f;
        }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .event-count {
            display: inline-block;
            margin-left: 12px;
            font-size: 13px;
            color: var(--text-muted);
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .hero {
            text-align: center;
            padding: 48px 24px 32px;
        }
        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(32px, 5vw, 52px);
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.1;
            margin-bottom: 14px;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .controls {
            max-width: 1240px;
            margin: 16px auto 32px;
            padding: 0 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls input[type="search"],
        .controls select {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid #2a2a55;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease;
        }
        .controls input[type="search"]:focus,
        .controls select:focus {
            border-color: var(--accent);
        }
        .controls input[type="search"] {
            flex: 1 1 280px;
            min-width: 240px;
        }
        .controls select {
            min-width: 140px;
            cursor: pointer;
        }
        .clear-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid #2a2a55;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s ease;
        }
        .clear-btn:hover {
            color: var(--text);
            border-color: var(--accent);
        }
        .results-info {
            margin-left: auto;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .grid-wrap {
            max-width: 1240px;
            margin: 0 auto 64px;
            padding: 0 24px;
        }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
        }
        .card-photo-wrap {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #0a0a1c;
        }
        .card-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-photo-fallback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 20px;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            line-height: 1.2;
        }
        .card-body {
            padding: 18px 18px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .card-artist {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 8px;
            line-height: 1.25;
        }
        .card-date {
            color: var(--accent2);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .card-time {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 10px;
        }
        .card-location {
            color: var(--text);
            font-size: 13px;
            margin-bottom: 4px;
        }
        .card-address {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .card-cta {
            margin-top: auto;
            display: inline-block;
            text-align: center;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            color: white;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.3px;
            padding: 11px 16px;
            border-radius: 8px;
            transition: filter 0.15s ease, transform 0.1s ease;
        }
        .card-cta:hover { filter: brightness(1.1); }
        .card-cta:active { transform: scale(0.98); }

        footer {
            text-align: center;
            padding: 32px 24px 48px;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid #1f1f3f;
        }
        footer a { color: var(--accent2); }

        @media (max-width: 600px) {
            .controls { gap: 8px; }
            .results-info { width: 100%; margin-left: 0; }
            header.site-header { padding: 22px 16px 14px; }
            .hero { padding: 28px 16px 20px; }
        }
    </style>
</head>

        // Hash-based gradient for missing-photo fallbacks
        const GRADIENT_COLORS = [
            ['#667eea', '#764ba2'],
            ['#f093fb', '#f5576c'],
            ['#4facfe', '#00f2fe'],
            ['#43e97b', '#38f9d7'],
            ['#fa709a', '#fee140'],
            ['#30cfd0', '#330867'],
            ['#a8edea', '#fed6e3'],
            ['#ff9a9e', '#fecfef'],
            ['#ffecd2', '#fcb69f'],
            ['#84fab0', '#8fd3f4']
        ];
        function hashStr(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) - h) + s.charCodeAt(i);
                h |= 0;
            }
            return Math.abs(h);
        }
        function gradientFor(slug) {
            const pair = GRADIENT_COLORS[hashStr(slug) % GRADIENT_COLORS.length];
            return `linear-gradient(135deg, ${pair[0]} 0%, ${pair[1]} 100%)`;
        }

        function fmtDate(iso) {
            // Avoid timezone drift by parsing as local date
            const [y, m, d] = iso.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            return dt.toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => (
                {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[c]
            ));
        }

        function renderCard(ev) {
            const slug = ev.slug;
            const grad = gradientFor(slug);
            const photoSrc = PHOTO_BASE + slug + '.jpg';
            const cityState = [ev.city, ev.state].filter(Boolean).join(', ');
            return `
                <div class="card">
                    <div class="card-photo-wrap">
                        <img src="${photoSrc}" alt="${escapeHtml(ev.artist)}" loading="lazy"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(ev.artist)}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-artist">${escapeHtml(ev.artist)}</div>
                        <div class="card-date">${fmtDate(ev.date)}</div>
                        ${ev.showtime ? `<div class="card-time">${escapeHtml(ev.showtime)}</div>` : ''}
                        ${cityState ? `<div class="card-location">${escapeHtml(cityState)}</div>` : ''}
                        ${ev.location ? `<div class="card-address">${escapeHtml(ev.location)}</div>` : ''}
                        <a class="card-cta" href="${escapeHtml(ev.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
                    </div>
                </div>`;
        }

        const grid = document.getElementById('eventsGrid');
        const searchInput = document.getElementById('searchInput');
        const stateFilter = document.getElementById('stateFilter');
        const clearBtn = document.getElementById('clearBtn');
        const resultsInfo = document.getElementById('resultsInfo');
        const eventCountBadge = document.getElementById('eventCount');

        function applyFilters() {
            const q = searchInput.value.trim().toLowerCase();
            const st = stateFilter.value;
            const filtered = events.filter(e => {
                if (st && e.state !== st) return false;
                if (q) {
                    const hay = (e.artist + ' ' + e.city + ' ' + e.state + ' ' + e.location).toLowerCase();
                    if (!hay.includes(q)) return false;
                }
                return true;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">No events match your filters. Try clearing them.</div>';
            } else {
                grid.innerHTML = filtered.map(renderCard).join('');
            }
            resultsInfo.textContent = `Showing ${filtered.length} of ${events.length}`;
        }

        searchInput.addEventListener('input', applyFilters);
        stateFilter.addEventListener('change', applyFilters);
        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            stateFilter.value = '';
            applyFilters();
        });

        document.getElementById('year').textContent = new Date().getFullYear();
        applyFilters();
    </script>
