<head>

    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent2: #f5a623;
            --bg: #0f0f23;
            --card-bg: #16213e;
            --card-border: #1a1a3e;
            --text: #e8e8f0;
            --text-muted: #8888aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.5; }
        a { color: inherit; text-decoration: none; }

        .fangenie-banner {
            background: linear-gradient(90deg, #16213e 0%, #1a1a3e 100%);
            border-bottom: 1px solid var(--card-border);
            padding: 10px 16px;
            text-align: center;
        }
        .fangenie-banner a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            color: var(--text-muted);
            font-size: 13px;
        }
        .fangenie-banner .powered-by {
            color: var(--text-muted);
            font-weight: 500;
        }
        .fangenie-banner .fg-logo {
            height: 22px;
            width: auto;
            vertical-align: middle;
        }
        .fangenie-banner .fg-tagline {
            color: var(--text);
            font-weight: 500;
        }

        .site-header {
            border-bottom: 1px solid var(--card-border);
            background: rgba(15, 15, 35, 0.85);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 22px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .header-meta {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }
        .header-meta strong { color: var(--text); font-weight: 700; }

        .hero {
            padding: 56px 20px 32px;
            text-align: center;
            background: radial-gradient(ellipse at center top, rgba(233, 69, 96, 0.18) 0%, rgba(15, 15, 35, 0) 60%);
        }
        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: clamp(32px, 6vw, 56px);
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #ffffff 0%, #e8e8f0 50%, var(--accent2) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 17px;
            max-width: 620px;
            margin: 0 auto;
        }

        .controls {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls input, .controls select, .controls button {
            font-family: inherit;
            font-size: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: border-color .15s ease, transform .15s ease;
        }
        .controls input::placeholder { color: var(--text-muted); }
        .controls input:focus, .controls select:focus { border-color: var(--accent); }
        .controls input { flex: 1 1 280px; }
        .controls select { flex: 0 1 180px; cursor: pointer; }
        .controls button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            padding: 12px 22px;
        }
        .controls button:hover { transform: translateY(-1px); }

        .results-summary {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .events {
            max-width: 1280px;
            margin: 0 auto;
            padding: 16px 20px 64px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(233, 69, 96, 0.5);
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.6);
        }

        .card-photo-wrap {
            position: relative;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: var(--primary);
        }
        .card-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .card-photo-fallback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 22px;
            text-align: center;
            color: #fff;
            padding: 16px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            line-height: 1.2;
        }

        .card-body { padding: 18px 18px 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .card-artist {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 19px;
            line-height: 1.2;
            letter-spacing: -0.01em;
            color: var(--text);
        }
        .card-date {
            color: var(--accent2);
            font-size: 14px;
            font-weight: 600;
        }
        .card-meta {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.45;
        }
        .card-meta div + div { margin-top: 4px; }
        .card-cta {
            margin-top: auto;
            padding-top: 14px;
        }
        .card-cta a {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            transition: transform .15s ease, opacity .15s ease;
            letter-spacing: 0.02em;
        }
        .card-cta a:hover { transform: translateY(-1px); opacity: 0.95; }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .site-footer {
            border-top: 1px solid var(--card-border);
            padding: 24px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .controls input, .controls select, .controls button { flex: 1 1 100%; }
            .header-inner { flex-direction: column; align-items: flex-start; gap: 6px; }
        }
    </style>
</head>

        document.getElementById('year').textContent = new Date().getFullYear();

        const GRADIENT_PALETTE = [
            'linear-gradient(135deg, #e94560 0%, #f5a623 100%)',
            'linear-gradient(135deg, #6a11cb 0%, #2575fc 100%)',
            'linear-gradient(135deg, #f857a6 0%, #ff5858 100%)',
            'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
            'linear-gradient(135deg, #ff9966 0%, #ff5e62 100%)',
            'linear-gradient(135deg, #00c6ff 0%, #0072ff 100%)',
            'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(135deg, #5ee7df 0%, #b490ca 100%)'
        ];

        function gradientFor(slug) {
            let h = 0;
            for (let i = 0; i < slug.length; i++) {
                h = ((h << 5) - h) + slug.charCodeAt(i);
                h |= 0;
            }
            return GRADIENT_PALETTE[Math.abs(h) % GRADIENT_PALETTE.length];
        }

        function fmtDate(d) {
            const [y, m, day] = d.split('-').map(Number);
            const dt = new Date(Date.UTC(y, m - 1, day));
            return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
        }

        function renderCard(e) {
            const grad = gradientFor(e.slug);
            const photo = PHOTO_BASE + e.slug + '.jpg';
            const artistHtml = escapeHtml(e.artist);
            const cityState = [e.city, e.state].filter(Boolean).join(', ');
            const showtime = e.showtime ? ' &middot; ' + escapeHtml(e.showtime) : '';
            const venueLine = e.location ? '<div>' + escapeHtml(e.location) + '</div>' : '';
            const cityLine = cityState ? '<div>' + escapeHtml(cityState) + '</div>' : '';
            return `
                <article class="card" data-artist="${artistHtml.toLowerCase()}" data-city="${escapeHtml((e.city||'').toLowerCase())}" data-state="${escapeHtml(e.state||'')}" data-venue="${escapeHtml((e.location||'').toLowerCase())}">
                    <div class="card-photo-wrap">
                        <img src="${photo}" alt="${artistHtml}" loading="lazy"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="card-photo-fallback" style="display:none;background:${grad}">${artistHtml}</div>
                    </div>
                    <div class="card-body">
                        <div class="card-artist">${artistHtml}</div>
                        <div class="card-date">${fmtDate(e.date)}${showtime}</div>
                        <div class="card-meta">${cityLine}${venueLine}</div>
                        <div class="card-cta"><a href="${escapeHtml(e.ticket)}" target="_blank" rel="noopener">Get Tickets &rarr;</a></div>
                    </div>
                </article>
            `;
        }

        const grid = document.getElementById('events');
        const summary = document.getElementById('results-summary');
        const searchEl = document.getElementById('search');
        const stateEl = document.getElementById('state-filter');
        const clearBtn = document.getElementById('clear-btn');

        function render() {
            const q = searchEl.value.trim().toLowerCase();
            const st = stateEl.value;
            const filtered = events.filter(e => {
                if (st && e.state !== st) return false;
                if (q) {
                    const hay = (e.artist + ' ' + (e.city||'') + ' ' + (e.state||'') + ' ' + (e.location||'')).toLowerCase();
                    if (!hay.includes(q)) return false;
                }
                return true;
            });
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty">No shows match your filters. Try clearing them.</div>';
            } else {
                grid.innerHTML = filtered.map(renderCard).join('');
            }
            summary.textContent = `Showing ${filtered.length} of ${events.length} upcoming shows`;
        }

        searchEl.addEventListener('input', render);
        stateEl.addEventListener('change', render);
        clearBtn.addEventListener('click', () => {
            searchEl.value = '';
            stateEl.value = '';
            render();
        });

        render();
    </script>
