    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent2: #f5a623;
            --bg: #0f0f23;
            --card-bg: #16213e;
            --card-border: #1a1a3e;
            --text: #e8e8f0;
            --text-muted: #8888aa;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* FanGenie Banner */
        .fangenie-banner {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #2a2a4e;
            padding: 10px 20px;
            text-align: center;
        }

        .fangenie-banner a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            flex-wrap: wrap;
            justify-content: center;
        }

        .fangenie-banner .powered-by {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .fangenie-banner .fg-logo {
            height: 24px;
            vertical-align: middle;
        }

        .fangenie-banner .fg-tagline {
            color: var(--accent2);
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 100%);
            padding: 20px 24px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent);
        }

        .event-count {
            background: var(--accent);
            color: var(--white);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            padding: 48px 24px 36px;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            color: var(--white);
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .hero h1 span {
            color: var(--accent);
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Search / Filter */
        .controls {
            background: var(--primary);
            padding: 20px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--white);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .state-select {
            padding: 10px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--white);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .state-select:focus {
            border-color: var(--accent);
        }

        .clear-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .clear-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .results-count {
            color: var(--text-muted);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* Events Grid */
        .events-wrapper {
            padding: 24px;
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .event-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .event-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(233, 69, 96, 0.2);
            border-color: var(--accent);
        }

        .card-photo {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .card-photo-gradient {
            width: 100%;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: rgba(255,255,255,0.9);
            text-align: center;
            padding: 12px;
            line-height: 1.3;
        }

        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-artist {
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--white);
            line-height: 1.3;
        }

        .card-show-info {
            color: var(--accent2);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 4px;
        }

        .card-meta-row {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .card-meta-row svg {
            flex-shrink: 0;
            opacity: 0.7;
        }

        .card-footer {
            padding: 12px 16px 16px;
            margin-top: auto;
        }

        .ticket-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: var(--white);
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.03em;
        }

        .ticket-btn:hover {
            background: #c73652;
            transform: translateY(-1px);
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .no-results .icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        /* Footer */

            background: var(--primary);
            border-top: 1px solid var(--card-border);
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            header {
                padding: 16px;
            }
            .logo {
                font-size: 1.4rem;
            }
            .hero {
                padding: 32px 16px 24px;
            }
            .controls {
                padding: 12px 16px;
            }
            .events-wrapper {
                padding: 16px;
            }
        }
    </style>

            ['#f5a623', '#e08800'],
            ['#3a86ff', '#1a66df'],
            ['#8b5cf6', '#7c3aed'],
            ['#10b981', '#059669'],
            ['#f59e0b', '#d97706'],
            ['#ef4444', '#dc2626'],
            ['#06b6d4', '#0891b2'],
            ['#84cc16', '#65a30d'],
            ['#ec4899', '#db2777'],
        ];

        function getGradient(slug) {
            let hash = 0;
            for (let i = 0; i < slug.length; i++) {
                hash = ((hash << 5) - hash) + slug.charCodeAt(i);
                hash |= 0;
            }
            const idx = Math.abs(hash) % GRADIENTS.length;
            const [c1, c2] = GRADIENTS[idx];
            return `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`;
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const date = new Date(y, m - 1, d);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(str) {
            return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function renderCard(e) {
            const hasPhoto = ARTIST_PHOTOS[e.slug];
            const photoHtml = hasPhoto
                ? `<img class="card-photo" src="${ARTIST_PHOTOS[e.slug]}" alt="${escapeHtml(e.artist)}" loading="lazy">`
                : `<div class="card-photo-gradient" style="background: ${getGradient(e.slug)}">${escapeHtml(e.artist)}</div>`;

            const locationLine = [e.city, e.state].filter(Boolean).join(', ');
            const showtimeLine = e.showtime ? `<div class="card-meta-row">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    ${escapeHtml(e.showtime)}
                </div>` : '';
            const locationLineFull = e.location ? `<div class="card-meta-row">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    ${escapeHtml(e.location)}
                </div>` : '';

            return `<div class="event-card">
            ${photoHtml}
            <div class="card-body">
                <div class="card-artist">${escapeHtml(e.artist)}</div>
                ${e.showInfo ? `<div class="card-show-info">${escapeHtml(e.showInfo)}</div>` : ''}
                <div class="card-meta">
                    <div class="card-meta-row">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${formatDate(e.date)}
                    </div>
                    ${showtimeLine}
                    ${locationLine ? `<div class="card-meta-row">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${escapeHtml(locationLine)}
                    </div>` : ''}
                    ${locationLineFull}
                </div>
            </div>
            <div class="card-footer">
                <a href="${escapeHtml(e.ticket)}" target="_blank" rel="noopener" class="ticket-btn">Get Tickets</a>
            </div>
        </div>`;
        }

        let filteredEvents = [...events];

        function render() {
            const grid = document.getElementById('eventsGrid');
            const countEl = document.getElementById('resultsCount');
            if (filteredEvents.length === 0) {
                grid.innerHTML = `<div class="no-results" style="grid-column:1/-1">
                    <div class="icon">🎵</div>
                    <p>No shows found matching your search.</p>
                    <p style="margin-top:8px;font-size:0.85rem;">Try adjusting your filters.</p>
                </div>`;
            } else {
                grid.innerHTML = filteredEvents.map(renderCard).join('');
            }
            countEl.textContent = filteredEvents.length + ' show' + (filteredEvents.length !== 1 ? 's' : '');
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const state = document.getElementById('stateFilter').value;
            filteredEvents = events.filter(e => {
                const matchState = !state || e.state === state;
                const matchSearch = !search || 
                    e.artist.toLowerCase().includes(search) ||
                    (e.city && e.city.toLowerCase().includes(search)) ||
                    (e.location && e.location.toLowerCase().includes(search)) ||
                    (e.showInfo && e.showInfo.toLowerCase().includes(search));
                return matchState && matchSearch;
            });
            render();
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('stateFilter').value = '';
            filteredEvents = [...events];
            render();
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('stateFilter').addEventListener('change', applyFilters);

        // Initial render
        render();
    </script>
</body>
</html>
