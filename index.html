    <style>
        :root {

            --bg: #0f0f23;
            --card-bg: #16213e;
            --card-border: #1a1a3e;
            --text: #e8e8f0;
            --text-muted: #8888aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.5; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }
        .fangenie-banner { background: linear-gradient(90deg, #1a1a2e, #2a2a4e); border-bottom: 1px solid var(--card-border); padding: 10px 20px; text-align: center; font-size: 13px; color: var(--text-muted); }
        .fangenie-banner a { display: inline-flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .fangenie-banner .powered-by { opacity: 0.85; }

        header { padding: 24px 20px 12px; border-bottom: 1px solid var(--card-border); background: linear-gradient(180deg, #14142a, var(--bg)); position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px); }

        .hero p { color: var(--text-muted); font-size: 18px; max-width: 560px; margin: 0 auto; }
        .controls { max-width: 1200px; margin: 0 auto 24px; padding: 0 20px; display: grid; grid-template-columns: 1fr auto auto; gap: 12px; }
        @media (max-width: 640px) { .controls { grid-template-columns: 1fr; } }
        .controls input, .controls select, .controls button { font-family: inherit; font-size: 15px; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text); transition: border-color 0.2s, transform 0.05s; outline: none; }
        .controls input:focus, .controls select:focus { border-color: var(--accent); }
        .controls input::placeholder { color: var(--text-muted); }
        .controls button { background: linear-gradient(90deg, var(--accent), var(--accent2)); border: none; cursor: pointer; font-weight: 600; color: #fff; }
        .controls button:hover { filter: brightness(1.1); }
        .controls button:active { transform: scale(0.98); }
        .grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 56px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; }
        .empty-state { grid-column: 1 / -1; text-align: center; color: var(--text-muted); padding: 64px 20px; font-size: 18px; }
        .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 12px 28px rgba(233,69,96,0.15); }
        .card-photo-wrap { position: relative; aspect-ratio: 16/9; overflow: hidden; background: var(--primary); }
        .card-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .card-photo-fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 16px; text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.45); letter-spacing: -0.3px; line-height: 1.15; }
        .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .card-artist { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 19px; color: #fff; line-height: 1.2; letter-spacing: -0.3px; }
        .card-meta { font-size: 13px; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
        .card-meta .row { display: flex; align-items: center; gap: 6px; }
        .card-meta .label { display: inline-block; min-width: 14px; opacity: 0.7; }
        .card-meta .date { color: var(--accent2); font-weight: 600; }
        .card-meta .city { color: var(--text); font-weight: 500; }
        .card-cta { margin-top: auto; padding-top: 12px; }
        .btn { display: inline-block; width: 100%; text-align: center; padding: 11px 16px; background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; border-radius: 8px; transition: filter 0.2s, transform 0.05s; }

        .btn:active { transform: scale(0.98); }
        footer { padding: 32px 20px; text-align: center; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--card-border); }
        footer a { color: var(--accent2); }

    const PALETTE = [
        ['#e94560', '#f5a623'],
        ['#5b21b6', '#ec4899'],
        ['#0ea5e9', '#22d3ee'],
        ['#16a34a', '#84cc16'],
        ['#f97316', '#facc15'],
        ['#6366f1', '#a855f7'],
        ['#14b8a6', '#0ea5e9'],
        ['#dc2626', '#f97316'],
        ['#7c3aed', '#3b82f6'],
        ['#db2777', '#f59e0b']
    ];
    function hashStr(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
        return Math.abs(h);
    }
    function gradientFor(slug) {
        const [a, b] = PALETTE[hashStr(slug) % PALETTE.length];
        return `linear-gradient(135deg, ${a} 0%, ${b} 100%)`;
    }
    function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
            '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
        })[c]);
    }
    function renderCard(e) {
        const photoUrl = PHOTO_BASE + encodeURIComponent(e.slug) + '.jpg';
        const grad = gradientFor(e.slug);
        const cityState = [e.city, e.state].filter(Boolean).join(', ');
        return `
            <article class="card">
                <a class="card-photo-wrap" href="${escapeHtml(e.ticket)}" target="_blank" rel="noopener">
                    <img src="${photoUrl}" alt="${escapeHtml(e.artist)}" loading="lazy"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                    <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(e.artist)}</div>
                </a>
                <div class="card-body">
                    <div class="card-artist">${escapeHtml(e.artist)}</div>
                    <div class="card-meta">
                        <div class="row"><span class="date">${escapeHtml(e.displayDate)}</span>${e.showtime ? ' &middot; <span>' + escapeHtml(e.showtime) + '</span>' : ''}</div>
                        ${cityState ? `<div class="row city">${escapeHtml(cityState)}</div>` : ''}
                        ${e.location ? `<div class="row" style="font-size:12px;opacity:0.85">${escapeHtml(e.location)}</div>` : ''}
                    </div>
                    <div class="card-cta">
                        <a class="btn" href="${escapeHtml(e.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
                    </div>
                </div>
            </article>
        `;
    }
    function applyFilters() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        const st = document.getElementById('stateFilter').value;
        const filtered = events.filter(e => {
            if (st && e.state !== st) return false;
            if (q) {
                const hay = [e.artist, e.city, e.state, e.location, e.platform].filter(Boolean).join(' ').toLowerCase();
                if (!hay.includes(q)) return false;
            }
            return true;
        });
        const grid = document.getElementById('grid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state">No shows match your search. Try clearing the filters.</div>';
        } else {
            grid.innerHTML = filtered.map(renderCard).join('');
        }
        document.getElementById('eventCount').textContent = filtered.length;
    }
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('stateFilter').addEventListener('change', applyFilters);
    document.getElementById('clearBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('stateFilter').value = '';
        applyFilters();
    });
    document.getElementById('year').textContent = new Date().getFullYear();
    applyFilters();
    </script>
