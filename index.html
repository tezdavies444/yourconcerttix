<meta property="og:title" content="YourConcertTix - Find Live Shows & Get Tickets">
<meta property="og:description" content="Find live concerts, tribute bands and shows near you. Get tickets to your next favorite event.">
<meta property="og:type" content="website">

<style>
:root{
    --primary:#1a1a2e;
    --accent:#e94560;
    --accent2:#f5a623;
    --bg:#0f0f23;
    --card-bg:#16213e;
    --card-border:#1a1a3e;
    --text:#e8e8f0;
    --text-muted:#8888aa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

.fangenie-banner{
    background:linear-gradient(90deg,#0a1838 0%,#1a1a2e 100%);
    padding:8px 16px;text-align:center;border-bottom:1px solid #1a1a3e;
}
.fangenie-banner a{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.fangenie-banner .powered-by{font-size:.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.fangenie-banner .fg-logo{height:22px;width:auto;display:inline-block;vertical-align:middle}
.fangenie-banner .fg-tagline{font-size:.85rem;color:#cbd2e0;font-weight:500}

header.site-header{
    padding:24px 24px 8px;text-align:center;
    background:linear-gradient(180deg,#0f0f23 0%,#16213e 100%);
}
.logo{
    font-family:'Montserrat',sans-serif;font-weight:900;font-size:1.9rem;letter-spacing:1px;
    background:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:transparent;
}
.event-count{color:var(--text-muted);font-size:.95rem;margin-top:6px}

section.hero{
    padding:36px 24px 16px;text-align:center;
}
section.hero h1{
    font-family:'Montserrat',sans-serif;font-weight:800;font-size:clamp(1.8rem,4.5vw,3rem);
    letter-spacing:-.5px;margin-bottom:8px;
}
section.hero p{color:var(--text-muted);font-size:1.05rem;max-width:600px;margin:0 auto}

.controls{
    max-width:1200px;margin:18px auto 0;padding:0 24px;
    display:grid;grid-template-columns:1fr 220px auto;gap:12px;align-items:center;
}
.controls input,.controls select,.controls button{
    background:var(--card-bg);color:var(--text);border:1px solid var(--card-border);
    padding:12px 14px;border-radius:10px;font-family:inherit;font-size:.95rem;
}
.controls input::placeholder{color:var(--text-muted)}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--accent)}
.controls button{
    cursor:pointer;background:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 100%);
    color:#fff;font-weight:600;border:none;
}
.controls button:hover{filter:brightness(1.08)}
@media (max-width:720px){
    .controls{grid-template-columns:1fr;gap:10px}
}

main{max-width:1200px;margin:0 auto;padding:24px}
.empty{padding:48px 24px;text-align:center;color:var(--text-muted)}

.events-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;
}
.card{
    background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;
    overflow:hidden;display:flex;flex-direction:column;
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
}
.card:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.4);border-color:#26305c}

.card-photo-wrap{
    width:100%;aspect-ratio:16/9;overflow:hidden;position:relative;background:#0a0a1e;
}
.card-photo-wrap img{
    width:100%;height:100%;object-fit:cover;display:block;
}
.card-photo-fallback{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.15rem;
    text-align:center;padding:18px;letter-spacing:.5px;line-height:1.2;
    text-shadow:0 1px 4px rgba(0,0,0,.45);
}

.card-body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px;flex:1}
.card-artist{
    font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.1rem;line-height:1.25;
    color:#fff;
}
.card-meta{font-size:.88rem;color:var(--text-muted);line-height:1.5}
.card-meta strong{color:var(--text);font-weight:600}
.card-actions{margin-top:auto;padding-top:6px}
.btn-tickets{
    display:inline-block;width:100%;text-align:center;padding:11px 16px;border-radius:9px;
    background:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 100%);
    color:#fff;font-weight:700;font-size:.92rem;letter-spacing:.4px;
}
.btn-tickets:hover{filter:brightness(1.08)}

footer{padding:28px 24px;text-align:center;color:var(--text-muted);font-size:.85rem;border-top:1px solid var(--card-border);margin-top:36px}
</style>
</head>

document.getElementById('year').textContent = new Date().getFullYear();

// Hash-based gradient palette
const PALETTE = [
    ['#e94560','#f5a623'],
    ['#7f5af0','#e94560'],
    ['#16c79a','#0f3460'],
    ['#ff7e5f','#feb47b'],
    ['#5b86e5','#36d1dc'],
    ['#ff512f','#dd2476'],
    ['#11998e','#38ef7d'],
    ['#fc466b','#3f5efb'],
    ['#fc4a1a','#f7b733'],
    ['#43cea2','#185a9d']
];
function hashStr(s){
    let h = 0;
    for (let i = 0; i < s.length; i++){ h = ((h<<5) - h) + s.charCodeAt(i); h |= 0; }
    return Math.abs(h);
}
function gradientFor(slug){
    const pair = PALETTE[hashStr(slug || '') % PALETTE.length];
    return 'linear-gradient(135deg,' + pair[0] + ' 0%,' + pair[1] + ' 100%)';
}

function escapeHtml(s){
    return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(iso, fallback){
    if (fallback) return fallback;
    if (!iso) return '';
    const d = new Date(iso + 'T12:00:00');
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function renderCard(e){
    const grad = gradientFor(e.slug);
    const photoUrl = PHOTO_BASE + e.slug + '.jpg';
    const venueLine = [e.location].filter(Boolean).join('');
    const cityState = [e.city, e.state].filter(Boolean).join(', ');
    const dateLine = fmtDate(e.date, e.date_text);
    const showtime = e.showtime ? ' &middot; ' + escapeHtml(e.showtime.trim()) : '';
    return `
    <div class="card">
        <div class="card-photo-wrap">
            <img src="${escapeHtml(photoUrl)}" alt="${escapeHtml(e.artist)}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(e.artist)}</div>
        </div>
        <div class="card-body">
            <div class="card-artist">${escapeHtml(e.artist)}</div>
            <div class="card-meta">
                <div><strong>${escapeHtml(dateLine)}</strong>${showtime}</div>
                ${cityState ? `<div>${escapeHtml(cityState)}</div>` : ''}
                ${venueLine ? `<div>${escapeHtml(venueLine)}</div>` : ''}
            </div>
            <div class="card-actions">
                <a class="btn-tickets" href="${escapeHtml(e.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
            </div>
        </div>
    </div>`;
}

const grid = document.getElementById('eventsGrid');
const emptyState = document.getElementById('emptyState');
const search = document.getElementById('searchInput');
const stateFilter = document.getElementById('stateFilter');
const clearBtn = document.getElementById('clearFilters');
const eventCount = document.getElementById('eventCount');

function render(){
    const q = search.value.trim().toLowerCase();
    const st = stateFilter.value;
    const filtered = events.filter(e => {
        if (st && e.state !== st) return false;
        if (q){
            const hay = [e.artist, e.city, e.state, e.location, e.date_text].join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });
    grid.innerHTML = filtered.map(renderCard).join('');
    emptyState.style.display = filtered.length ? 'none' : 'block';
    eventCount.textContent = filtered.length === events.length
        ? events.length + ' upcoming events'
        : filtered.length + ' of ' + events.length + ' events';
}

search.addEventListener('input', render);
stateFilter.addEventListener('change', render);
clearBtn.addEventListener('click', () => { search.value = ''; stateFilter.value = ''; render(); });

render();
</script>
