<style>
:root {
  --primary: #1a1a2e;
  --accent: #e94560;
  --accent2: #f5a623;
  --bg: #0f0f23;
  --card-bg: #16213e;
  --card-border: #1a1a3e;
  --text: #e8e8f0;
  --text-muted: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, -apple-system, sans-serif; min-height: 100vh; }
body { padding-bottom: 40px; }
a { color: inherit; text-decoration: none; }

.fangenie-banner {
  background: linear-gradient(90deg, var(--primary), #2a1a4e);
  border-bottom: 1px solid var(--card-border);
  padding: 10px 16px;
  text-align: center;
}
.fangenie-banner a {
  display: inline-flex; align-items: center; gap: 10px;
  flex-wrap: wrap; justify-content: center;
  font-size: 14px; color: var(--text);
}
.fangenie-banner .powered-by { color: var(--text-muted); font-weight: 500; }
.fangenie-banner .fg-logo { height: 22px; width: auto; vertical-align: middle; }
.fangenie-banner .fg-tagline { color: var(--accent2); font-weight: 600; }

header.site-header {
  padding: 24px 20px 10px;
  text-align: center;
}
header.site-header .logo {
  font-family: 'Montserrat', sans-serif;
  font-weight: 800; font-size: 28px;
  letter-spacing: -0.5px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
header.site-header .count {
  margin-top: 6px; color: var(--text-muted); font-size: 14px;
}

.hero {
  padding: 30px 20px 20px;
  text-align: center;
}
.hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 800; letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.hero p { color: var(--text-muted); max-width: 640px; margin: 0 auto; }

.controls {
  max-width: 1100px;
  margin: 16px auto 24px;
  padding: 0 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: stretch;
}
.controls input, .controls select, .controls button {
  font-family: inherit; font-size: 15px;
  padding: 12px 14px;
  border-radius: 10px; border: 1px solid var(--card-border);
  background: var(--card-bg); color: var(--text);
}
.controls input { flex: 2 1 220px; min-width: 180px; }
.controls select { flex: 1 1 140px; min-width: 120px; }
.controls input::placeholder { color: var(--text-muted); }
.controls button {
  cursor: pointer;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: white; font-weight: 600; border: none;
  padding: 12px 18px;
}
.controls button:hover { filter: brightness(1.08); }

.events-grid {
  max-width: 1280px; margin: 0 auto; padding: 0 20px;
  display: grid; gap: 18px;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 14px;
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 6px 24px rgba(233,69,96,.15); }

.card-photo-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  overflow: hidden;
  background: var(--primary);
}
.card-photo-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.card-photo-fallback {
  position: absolute; inset: 0;
  display: none; align-items: center; justify-content: center;
  text-align: center; padding: 16px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 700; font-size: 20px; color: white;
  letter-spacing: 0.3px; line-height: 1.2;
  text-shadow: 0 2px 8px rgba(0,0,0,.35);
}

.card-body { padding: 16px 16px 18px; flex: 1; display: flex; flex-direction: column; }
.card .artist {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700; font-size: 18px; line-height: 1.25;
  margin-bottom: 6px;
}
.card .meta { color: var(--text-muted); font-size: 13.5px; margin-bottom: 4px; }
.card .meta strong { color: var(--text); font-weight: 600; }
.card .where { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
.card .platform {
  display: inline-block;
  margin-top: 8px;
  padding: 3px 9px;
  border-radius: 999px;
  background: rgba(245,166,35,.12);
  border: 1px solid rgba(245,166,35,.35);
  color: var(--accent2);
  font-size: 11.5px; font-weight: 600;
  letter-spacing: 0.4px; text-transform: uppercase;
}
.card .ticket-btn {
  margin-top: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 14px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  color: white; font-weight: 600; font-size: 14.5px;
  border-radius: 10px;
  text-align: center;
}
.card .ticket-btn:hover { filter: brightness(1.08); }

.empty-state {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}

footer.site-footer {
  margin-top: 50px; padding: 24px 20px;
  text-align: center; color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--card-border);
}

@media (max-width: 480px) {
  .controls { flex-direction: column; }
  .controls input, .controls select, .controls button { flex: 1 1 auto; width: 100%; }
}
</style>
</head>

// 10-color gradient palette
const GRADIENTS = [
  'linear-gradient(135deg,#e94560,#f5a623)',
  'linear-gradient(135deg,#1a1a2e,#e94560)',
  'linear-gradient(135deg,#0f3460,#16213e)',
  'linear-gradient(135deg,#5b2a86,#a55eea)',
  'linear-gradient(135deg,#16a085,#27ae60)',
  'linear-gradient(135deg,#e84393,#fd79a8)',
  'linear-gradient(135deg,#0984e3,#74b9ff)',
  'linear-gradient(135deg,#6c5ce7,#a29bfe)',
  'linear-gradient(135deg,#d35400,#e67e22)',
  'linear-gradient(135deg,#2c3e50,#fd746c)'
];

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}
function gradientFor(name) {
  return GRADIENTS[hashStr(name) % GRADIENTS.length];
}
function escapeHtml(t) {
  return String(t || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}
function escapeAttr(t) {
  return escapeHtml(t).replace(/`/g, '&#96;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-').map(Number);
  if (!y) return iso;
  const dt = new Date(Date.UTC(y, m-1, d));
  return dt.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric', timeZone:'UTC' });
}

function renderCard(e) {
  const grad = gradientFor(e.artist || e.slug || '');
  const photoUrl = PHOTO_BASE + encodeURIComponent(e.slug) + '.jpg';
  const cityState = [e.city, e.state].filter(Boolean).join(', ');
  const dateLabel = e.dateText || fmtDate(e.date);
  return `
  <article class="card">
    <div class="card-photo-wrap">
      <img src="${escapeAttr(photoUrl)}" alt="${escapeAttr(e.artist)}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-photo-fallback" style="background:${grad}">${escapeHtml(e.artist)}</div>
    </div>
    <div class="card-body">
      <div class="artist">${escapeHtml(e.artist)}</div>
      <div class="meta"><strong>${escapeHtml(dateLabel)}</strong>${e.showtime ? ' &middot; ' + escapeHtml(e.showtime) : ''}</div>
      ${cityState ? `<div class="where">${escapeHtml(cityState)}</div>` : ''}
      ${e.location && e.location.trim() && e.location.trim() !== cityState ? `<div class="where">${escapeHtml(e.location)}</div>` : ''}
      ${e.platform ? `<span class="platform">${escapeHtml(e.platform)}</span>` : ''}
      <a class="ticket-btn" href="${escapeAttr(e.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
    </div>
  </article>`;
}

const grid = document.getElementById('events-grid');
const countEl = document.getElementById('event-count');
const searchEl = document.getElementById('search-input');
const stateEl = document.getElementById('state-filter');
const clearBtn = document.getElementById('clear-btn');

function applyFilters() {
  const q = (searchEl.value || '').trim().toLowerCase();
  const st = stateEl.value || '';
  const filtered = events.filter(e => {
    if (st && e.state !== st) return false;
    if (q) {
      const hay = (e.artist + ' ' + (e.city||'') + ' ' + (e.location||'') + ' ' + (e.state||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  countEl.textContent = filtered.length + ' upcoming show' + (filtered.length === 1 ? '' : 's');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">No shows match your filters yet.</div>';
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

searchEl.addEventListener('input', applyFilters);
stateEl.addEventListener('change', applyFilters);
clearBtn.addEventListener('click', () => {
  searchEl.value = '';
  stateEl.value = '';
  applyFilters();
});

applyFilters();
</script>
