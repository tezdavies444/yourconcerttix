<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #f5a623;
    --bg: #0f0f23;
    --card-bg: #16213e;
    --card-border: #1a1a3e;
    --text: #e8e8f0;
    --text-muted: #8888aa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }

  /* FanGenie banner */
  .fangenie-banner {
    background: linear-gradient(90deg, #0c0c1c 0%, #1a1a3e 100%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 8px 16px;
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
  }
  .fangenie-banner a { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .fangenie-banner .powered-by { font-weight: 500; }
  .fangenie-banner .fg-logo { height: 18px; vertical-align: middle; }
  .fangenie-banner .fg-tagline { color: var(--text); font-weight: 500; }
  .fangenie-banner a:hover .fg-tagline { color: var(--accent2); }

  /* Header */
  header.site-header {
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--primary);
  }
  .logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .event-count {
    font-size: 13px;
    color: var(--text-muted);
  }
  .event-count strong { color: var(--text); }

  /* Hero */
  .hero {
    text-align: center;
    padding: 56px 24px 24px;
    background: radial-gradient(circle at 50% -20%, rgba(233,69,96,0.18), transparent 60%), var(--bg);
  }
  .hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 5vw, 52px);
    margin: 0 0 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hero p {
    font-size: 17px;
    color: var(--text-muted);
    max-width: 640px;
    margin: 0 auto;
  }

  /* Filters */
  .filters {
    max-width: 1200px;
    margin: 16px auto 24px;
    padding: 0 24px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filters input, .filters select, .filters button {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s ease;
  }
  .filters input { flex: 1 1 240px; min-width: 200px; }
  .filters input::placeholder { color: var(--text-muted); }
  .filters input:focus, .filters select:focus { border-color: var(--accent); }
  .filters select { min-width: 160px; cursor: pointer; }
  .filters button {
    cursor: pointer;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: transparent;
    font-weight: 600;
  }
  .filters button:hover { background: var(--accent); color: white; }

  /* Events grid */
  .events {
    max-width: 1200px;
    margin: 0 auto 48px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .event-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .event-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 12px 32px rgba(233,69,96,0.15);
  }
  .card-photo-wrap {
    position: relative;
    aspect-ratio: 16/9;
    overflow: hidden;
    background: var(--primary);
  }
  .card-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-photo-fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    line-height: 1.2;
  }

  .card-body {
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }
  .card-artist {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    line-height: 1.25;
  }
  .card-date {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
  }
  .card-meta {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }
  .card-meta span { display: block; }
  .card-meta .city-state { color: var(--text); font-weight: 500; }
  .card-cta {
    display: inline-block;
    margin-top: 6px;
    padding: 10px 16px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: white;
    font-weight: 700;
    font-size: 14px;
    border-radius: 8px;
    text-align: center;
    transition: opacity .15s ease;
  }
  .card-cta:hover { opacity: 0.9; }
  .card-platform {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-top: 4px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  footer.site-footer {
    text-align: center;
    padding: 28px 24px;
    border-top: 1px solid rgba(255,255,255,0.05);
    color: var(--text-muted);
    font-size: 13px;
  }
</style>

  function renderCard(e) {
    const grad = gradientFor(e.slug);
    const cityState = [e.city, e.state].filter(Boolean).join(', ');
    const photoUrl = PHOTO_BASE + e.slug + '.jpg';
    return `
      <article class="event-card">
        <div class="card-photo-wrap">
          <img src="${escapeAttr(photoUrl)}" alt="${escapeAttr(e.artist)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="card-photo-fallback" style="display:none;background:${grad}">${escapeHtml(e.artist)}</div>
        </div>
        <div class="card-body">
          <div class="card-artist">${escapeHtml(e.artist)}</div>
          <div class="card-date">${escapeHtml(formatDate(e))}${e.showtime ? ' • ' + escapeHtml(e.showtime) : ''}</div>
          <div class="card-meta">
            ${cityState ? `<span class="city-state">${escapeHtml(cityState)}</span>` : ''}
            ${e.location ? `<span>${escapeHtml(e.location)}</span>` : ''}
          </div>
          <a class="card-cta" href="${escapeAttr(e.ticket)}" target="_blank" rel="noopener">Get Tickets</a>
          ${e.platform ? `<div class="card-platform">via ${escapeHtml(e.platform)}</div>` : ''}
        </div>
      </article>
    `;
  }

  const $events = document.getElementById('events');
  const $search = document.getElementById('search');
  const $state = document.getElementById('state-filter');
  const $clear = document.getElementById('clear-filters');
  const $count = document.getElementById('event-count');

  function applyFilters() {
    const q = ($search.value || '').trim().toLowerCase();
    const st = $state.value || '';
    const filtered = events.filter(e => {
      if (st && e.state !== st) return false;
      if (q) {
        const hay = (e.artist + ' ' + e.city + ' ' + e.location + ' ' + e.state + ' ' + e.platform).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    if (!filtered.length) {
      $events.innerHTML = '<div class="empty-state">No shows match your filters. Try clearing them.</div>';
    } else {
      $events.innerHTML = filtered.map(renderCard).join('');
    }
    $count.textContent = filtered.length;
  }

  $search.addEventListener('input', applyFilters);
  $state.addEventListener('change', applyFilters);
  $clear.addEventListener('click', () => { $search.value = ''; $state.value = ''; applyFilters(); });

  document.getElementById('year').textContent = new Date().getFullYear();
  applyFilters();
</script>
</body>
</html>
