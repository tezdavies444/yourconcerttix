<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Find live concert events near you and get tickets. Browse upcoming shows across the US.">

    <meta property="og:description" content="Browse upcoming live shows and get tickets to the best tribute and entertainment acts.">

    <style>
        :root {
            --primary: #1a1a2e;
            --accent: #e94560;
            --accent2: #f5a623;
            --bg: #0f0f23;
            --card-bg: #16213e;
            --card-border: #1a1a3e;
            --text: #e8e8f0;
            --text-muted: #8888aa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .fangenie-banner {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a3e 100%);
            padding: 10px 20px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
        }
        .fangenie-banner a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        .powered-by {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .fg-logo {
            height: 28px;
            vertical-align: middle;
        }
        .fg-tagline {
            font-size: 0.8rem;
            color: var(--accent2);
            font-weight: 500;
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #0f3460 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .event-count {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .hero {
            text-align: center;
            padding: 50px 20px 30px;
        }
        .hero h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .controls {
            max-width: 900px;
            margin: 0 auto 30px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .controls input, .controls select, .controls button {
            padding: 12px 18px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .controls input:focus, .controls select:focus {
            border-color: var(--accent);
        }
        .controls input { flex: 1; min-width: 220px; }
        .controls select { min-width: 160px; cursor: pointer; }
        .controls button {
            background: var(--accent);
            border-color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .controls button:hover { opacity: 0.85; }
        .grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.15);
        }
        .card-photo-wrap {
            aspect-ratio: 16/9;
            overflow: hidden;
            position: relative;
            background: var(--primary);
        }
        .card-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-photo-fallback {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            padding: 15px;
            text-align: center;
        }
        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-artist {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }
        .card-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-detail .icon { font-size: 1rem; }
        .card-location {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.3;
        }
        .card-footer {
            padding: 0 16px 16px;
            margin-top: auto;
        }
        .btn-ticket {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, var(--accent), #c23152);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
            margin-top: 12px;
        }
        .btn-ticket:hover { opacity: 0.9; }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--card-border);
        }
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            .logo { font-size: 1.3rem; }
            .hero h1 { font-size: 1.8rem; }
            .fg-tagline { display: none; }
        }
    </style>
</head>

        const COLORS = ['#e94560','#f5a623','#0f3460','#533483','#16c79a','#e84545','#903749','#185adb','#ff6363','#45ada8'];

        function hashSlug(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
            return Math.abs(h);
        }

        function gradient(slug) {
            const h = hashSlug(slug);
            const c1 = COLORS[h % COLORS.length];
            const c2 = COLORS[(h + 3) % COLORS.length];
            return 'linear-gradient(135deg, ' + c1 + ', ' + c2 + ')';
        }

        function formatDate(d) {
            const dt = new Date(d + 'T12:00:00');
            return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
        }

        function render() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const st = document.getElementById('stateFilter').value;
            const grid = document.getElementById('eventsGrid');
            const filtered = events.filter(e => {
                if (st && e.state !== st) return false;
                if (q && !(e.artist.toLowerCase().includes(q) || e.city.toLowerCase().includes(q) || e.location.toLowerCase().includes(q))) return false;
                return true;
            });
            document.getElementById('eventCount').textContent = filtered.length + ' Show' + (filtered.length !== 1 ? 's' : '');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">No shows found matching your criteria. Try adjusting your filters.</div>';
                return;
            }
            grid.innerHTML = filtered.map(e => {
                const g = gradient(e.slug);
                return '<div class="card">' +
                    '<div class="card-photo-wrap">' +
                        '<img src="' + PHOTO_BASE + e.slug + '.jpg" alt="' + e.artist.replace(/"/g,'&quot;') + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
                        '<div class="card-photo-fallback" style="display:none;background:' + g + '">' + e.artist.replace(/</g,'&lt;') + '</div>' +
                    '</div>' +
                    '<div class="card-body">' +
                        '<div class="card-artist">' + e.artist.replace(/</g,'&lt;') + '</div>' +
                        '<div class="card-detail"><span class="icon">📅</span> ' + formatDate(e.date) + '</div>' +
                        (e.showtime ? '<div class="card-detail"><span class="icon">🕐</span> ' + e.showtime.replace(/</g,'&lt;') + '</div>' : '') +
                        (e.showInfo && e.showInfo !== formatDate(e.date) ? '<div class="card-detail"><span class="icon">🎵</span> ' + e.showInfo.replace(/</g,'&lt;') + '</div>' : '') +
                        '<div class="card-detail"><span class="icon">📍</span> ' + (e.city ? e.city.replace(/</g,'&lt;') : '') + (e.state ? ', ' + e.state : '') + '</div>' +
                        (e.location ? '<div class="card-location">' + e.location.replace(/</g,'&lt;') + '</div>' : '') +
                    '</div>' +
                    '<div class="card-footer">' +
                        '<a href="' + e.ticket + '" target="_blank" rel="noopener" class="btn-ticket">🎟️ Get Tickets' + (e.platform ? ' via ' + e.platform.replace(/</g,'&lt;') : '') + '</a>' +
                    '</div>' +
                '</div>';
            }).join('');
        }
        render();
    </script>
