<style>
:root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent2: #f5a623;
    --bg: #0f0f23;
    --card-bg: #16213e;
    --card-border: #1a1a3e;
    --text: #e8e8f0;
    --text-muted: #8888aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

.fangenie-banner {
    background: linear-gradient(90deg, #1a1a2e, #2a2a4e);
    border-bottom: 1px solid var(--card-border);
    padding: 8px 16px;
    text-align: center;
    font-size: 14px;
}
.fangenie-banner a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
}
.fangenie-banner .powered-by {
    color: var(--text-muted);
    font-weight: 500;
}
.fangenie-banner .fg-logo {
    height: 22px;
    vertical-align: middle;
}
.fangenie-banner .fg-tagline {
    color: var(--text);
    font-weight: 500;
}

header {
    padding: 24px 16px 16px;
    text-align: center;
    border-bottom: 1px solid var(--card-border);
    background: var(--primary);
}
.logo {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    display: inline-block;
}
.event-count {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 6px;
}

.hero {
    padding: 48px 16px 24px;
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
}
.hero h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 44px);
    line-height: 1.15;
    letter-spacing: -0.02em;
}
.hero p {
    color: var(--text-muted);
    margin-top: 12px;
    font-size: 17px;
}

.controls {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.controls input,
.controls select,
.controls button {
    font-family: inherit;
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text);
    outline: none;
}
.controls input::placeholder { color: var(--text-muted); }
.controls input { flex: 1 1 240px; min-width: 200px; }
.controls select { flex: 0 1 180px; cursor: pointer; }
.controls button {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.2s;
}
.controls button:hover { filter: brightness(1.1); }
.controls input:focus,
.controls select:focus { border-color: var(--accent); }

.events {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 16px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    border-color: var(--accent);
}

.card-photo-wrap {
    aspect-ratio: 16/9;
    overflow: hidden;
    position: relative;
    background: var(--primary);
}
.card-photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
.card-photo-fallback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    line-height: 1.2;
}

.card-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
}
.card-artist {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 18px;
    line-height: 1.25;
}
.card-meta {
    color: var(--text-muted);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.card-date {
    color: var(--accent2);
    font-weight: 600;
    font-size: 14px;
}
.card-cta {
    margin-top: auto;
    padding: 11px 14px;
    background: var(--accent);
    color: #fff;
    text-align: center;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    transition: filter 0.2s;
}
.card-cta:hover { filter: brightness(1.1); }

.empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
}

footer {
    border-top: 1px solid var(--card-border);
    padding: 24px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
}

@media (max-width: 600px) {
    .controls input,
    .controls select { flex: 1 1 100%; }
    .controls button { flex: 1 1 100%; }
}
</style>
</head>

// ---------- Gradient fallback ----------
const GRADIENT_PALETTE = [
    ['#e94560','#f5a623'],
    ['#3a86ff','#8338ec'],
    ['#06d6a0','#118ab2'],
    ['#ff006e','#fb5607'],
    ['#7209b7','#3a0ca3'],
    ['#f72585','#b5179e'],
    ['#ffbe0b','#fb5607'],
    ['#0077b6','#48cae4'],
    ['#9d4edd','#5a189a'],
    ['#ff5a5f','#ffd166']
];

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) {
        h = ((h << 5) - h) + s.charCodeAt(i);
        h |= 0;
    }
    return Math.abs(h);
}

function gradientFor(slug) {
    const pair = GRADIENT_PALETTE[hashStr(slug || 'x') % GRADIENT_PALETTE.length];
    return `linear-gradient(135deg, ${pair[0]}, ${pair[1]})`;
}

// ---------- Date formatting ----------
function formatDate(iso) {
    const [y,m,d] = iso.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m-1, d));
    const opts = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' };
    return dt.toLocaleDateString('en-US', opts);
}

// ---------- Escape ----------
function esc(s) {
    return String(s == null ? '' : s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
}

// ---------- Card render ----------
function renderCard(e) {
    const grad = gradientFor(e.slug);
    const photo = PHOTO_BASE + e.slug + '.jpg';
    const cityState = [e.city, e.state].filter(Boolean).join(', ');
    const dateLine = [formatDate(e.date), e.showtime].filter(Boolean).join(' · ');
    return `
    <article class="card">
        <a href="${esc(e.ticket)}" target="_blank" rel="noopener">
            <div class="card-photo-wrap">
                <img src="${esc(photo)}" alt="${esc(e.artist)}" loading="lazy"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="card-photo-fallback" style="background:${grad}">${esc(e.artist)}</div>
            </div>
        </a>
        <div class="card-body">
            <div class="card-artist">${esc(e.artist)}</div>
            <div class="card-date">${esc(dateLine)}</div>
            <div class="card-meta">
                ${cityState ? `<span>${esc(cityState)}</span>` : ''}
                ${e.location && e.location.replace(/[, ]+/g,'').length ? `<span>${esc(e.location)}</span>` : ''}
            </div>
            <a href="${esc(e.ticket)}" target="_blank" rel="noopener" class="card-cta">Get Tickets</a>
        </div>
    </article>`;
}

// ---------- Filtering ----------
const grid = document.getElementById('eventsGrid');
const searchInput = document.getElementById('searchInput');
const stateSelect = document.getElementById('stateSelect');
const clearBtn = document.getElementById('clearBtn');
const countEl = document.getElementById('eventCount');

function render() {
    const q = searchInput.value.trim().toLowerCase();
    const st = stateSelect.value;
    const filtered = events.filter(e => {
        if (st && e.state !== st) return false;
        if (q) {
            const hay = (e.artist + ' ' + e.city + ' ' + e.state + ' ' + e.location + ' ' + e.platform).toLowerCase();
            if (!hay.includes(q)) return false;
        }
        return true;
    });
    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">No events match your filters.</div>';
    } else {
        grid.innerHTML = filtered.map(renderCard).join('');
    }
    countEl.textContent = filtered.length + ' of ' + events.length + ' events';
}

searchInput.addEventListener('input', render);
stateSelect.addEventListener('change', render);
clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    stateSelect.value = '';
    render();
});

document.getElementById('year').textContent = new Date().getFullYear();
render();
</script>
